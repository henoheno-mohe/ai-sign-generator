<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="400" height="300" fill="#1a1c23" />
  
  <!-- Neon Glow -->
  <text x="200" y="160" font-family="Brush Script MT, cursive, sans-serif" font-size="70" fill="none" stroke="#ffaa00" stroke-width="12" text-anchor="middle" transform="rotate(-5, 200, 150)" style="filter: blur(8px); opacity: 0.9;">Night Owl</text>
  <path d="M 100 200 Q 200 230 300 180" fill="none" stroke="#00ffaa" stroke-width="10" stroke-linecap="round" style="filter: blur(8px); opacity: 0.9;" />

  <!-- Neon Core -->
  <text x="200" y="160" font-family="Brush Script MT, cursive, sans-serif" font-size="70" fill="none" stroke="#fff" stroke-width="3" text-anchor="middle" transform="rotate(-5, 200, 150)">Night Owl</text>
  <path d="M 100 200 Q 200 230 300 180" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" />

  <!-- Sandwich Panel and Bolts -->
  <rect x="50" y="60" width="300" height="180" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
  <circle cx="65" cy="75" r="4" fill="#aaa" />
  <circle cx="335" cy="75" r="4" fill="#aaa" />
  <circle cx="65" cy="225" r="4" fill="#aaa" />
  <circle cx="335" cy="225" r="4" fill="#aaa" />
</svg>